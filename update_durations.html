<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actualizando Duraciones...</title>
</head>
<body>
    <h1 id="status" style="font-family: sans-serif;">Actualizando duraciones a 90 minutos... por favor espera.</h1>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/config.js"></script>
    <script>
        async function updateDurations() {
            // Inicializar Firebase
            if (!firebase.apps.length) {
                firebase.initializeApp(APP_CONFIG.firebase);
            }
            const db = firebase.firestore();
            
            try {
                // Obtener todos los servicios
                const servSnap = await db.collection('services').get();
                
                // Actualizar la duración de todos a 90 minutos
                for (const doc of servSnap.docs) {
                    await db.collection('services').doc(doc.id).update({ 
                        durationMinutes: 90 
                    });
                }

                document.getElementById('status').innerText = 'UPDATED_SUCCESSFULLY (Todos los servicios ahora duran 1h 30min)';
                document.getElementById('status').style.color = 'green';
            } catch (e) {
                document.getElementById('status').innerText = 'ERROR: ' + e.message;
                document.getElementById('status').style.color = 'red';
            }
        }
        
        updateDurations();
    </script>
</body>
</html>
