<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Updating Prices...</title>
</head>
<body>
    <h1 id="status">Updating prices... please wait.</h1>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/config.js"></script>
    <script>
        async function updatePrices() {
            firebase.initializeApp(APP_CONFIG.firebase);
            const db = firebase.firestore();
            
            try {
                // Actualizar Servicios
                const servSnap = await db.collection('services').get();
                for (const doc of servSnap.docs) {
                    const data = doc.data();
                    let newPrice = 5;
                    const name = (data.name || '').toLowerCase();
                    
                    if (name.includes('corte + barba') || name.includes('completo')) newPrice = 8;
                    else if (name.includes('afeitado') || name.includes('barba')) newPrice = 4;
                    else if (name.includes('cejas')) newPrice = 2;
                    else if (name.includes('tinte') || name.includes('color')) newPrice = 12;
                    else if (name.includes('niño')) newPrice = 4;
                    
                    await db.collection('services').doc(doc.id).update({ price: newPrice });
                }

                // Actualizar Productos
                const prodSnap = await db.collection('products').get();
                for (const doc of prodSnap.docs) {
                    const data = doc.data();
                    let newPrice = 6;
                    const name = (data.name || '').toLowerCase();
                    
                    if (name.includes('aceite')) newPrice = 8;
                    else if (name.includes('cera') || name.includes('pomada')) newPrice = 5;
                    else if (name.includes('shampoo')) newPrice = 6;
                    else if (name.includes('navaja')) newPrice = 3;
                    
                    await db.collection('products').doc(doc.id).update({ price: newPrice });
                }

                document.getElementById('status').innerText = 'UPDATED_SUCCESSFULLY';
            } catch (e) {
                document.getElementById('status').innerText = 'ERROR: ' + e.message;
            }
        }
        updatePrices();
    </script>
</body>
</html>
