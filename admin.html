<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbería Elite - Panel Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Layout Admin */
        body { background-color: var(--color-bg-alt); }
        
        .admin-layout { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 250px; background-color: var(--color-bg); border-right: 1px solid var(--color-border);
            padding: 1.5rem 0; display: flex; flex-direction: column;
        }
        .sidebar-brand { padding: 0 1.5rem 2rem; border-bottom: 1px solid var(--color-border); margin-bottom: 1rem; }
        .sidebar-nav { flex: 1; }
        .sidebar-link {
            display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem;
            color: var(--color-text-muted); transition: var(--transition);
        }
        .sidebar-link:hover, .sidebar-link.active {
            color: var(--color-gold); background-color: var(--color-gold-dim); border-right: 3px solid var(--color-gold);
        }
        
        .admin-content { flex: 1; padding: 2rem; overflow-y: auto; }
        
        /* Tablas */
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--color-border); }
        th { color: var(--color-text-muted); font-weight: 500; font-size: 0.9rem; text-transform: uppercase; }
        tr:hover { background-color: rgba(255, 255, 255, 0.02); }
        
        .status-badge {
            padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: bold;
        }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-completed { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        
        /* Vistas / Tabs */
        .admin-view { display: none; animation: fadeIn 0.3s ease; }
        .admin-view.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        @media (max-width: 768px) {
            .admin-layout { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--color-border); }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <a href="index.html" class="navbar-brand">
                    <i class="fa-solid fa-scissors"></i>
                    <span id="nav-shop-name" style="font-size: 1.2rem;">Barbería Elite</span>
                </a>
                <p class="text-muted" style="font-size: 0.8rem; margin-top: 0.5rem;">Panel de Administración</p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="sidebar-link active" data-target="view-citas">
                    <i class="fa-solid fa-calendar-check"></i> Citas
                </a>
                <a href="#" class="sidebar-link" data-target="view-catalogo">
                    <i class="fa-solid fa-store"></i> Servicios
                </a>
                <a href="#" class="sidebar-link" data-target="view-productos">
                    <i class="fa-solid fa-box"></i> Productos
                </a>
            </nav>
            
            <div style="padding: 1.5rem; border-top: 1px solid var(--color-border);">
                <a href="index.html" class="btn btn-outline" style="width: 100%; font-size: 0.9rem;">
                    <i class="fa-solid fa-arrow-left"></i> Volver a Web
                </a>
            </div>
        </aside>

        <!-- Contenido Principal -->
        <main class="admin-content">
            
            <!-- VISTA: CITAS -->
            <section id="view-citas" class="admin-view active">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2>Citas Agendadas</h2>
                    <button class="btn btn-outline" id="btn-refresh-citas"><i class="fa-solid fa-rotate-right"></i> Actualizar</button>
                </div>
                
                <div class="card" style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Fecha y Hora</th>
                                <th>Cliente</th>
                                <th>Teléfono</th>
                                <th>Servicio</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="table-citas">
                            <tr><td colspan="5" class="text-center"><span class="loader"></span></td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- VISTA: CATÁLOGO DE SERVICIOS -->
            <section id="view-catalogo" class="admin-view">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2>Servicios (Catálogo)</h2>
                </div>
                
                <div class="card" style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Servicio</th>
                                <th>Precio</th>
                                <th>Duración</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="table-catalogo">
                            <tr><td colspan="4" class="text-center"><span class="loader"></span></td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- VISTA: PRODUCTOS (TIENDA) -->
            <section id="view-productos" class="admin-view">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2>Productos (Tienda)</h2>
                </div>
                
                <div class="card" style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="table-productos">
                            <tr><td colspan="4" class="text-center"><span class="loader"></span></td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
            
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    
    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
